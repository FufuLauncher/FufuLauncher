name: 建议与功能请求 (Suggestions & Feature Requests)
description: 提交开发建议、功能改进方案或新增功能请求
title: "[Suggestion]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ### 提交须知
        在提交新的功能请求前，请先检索现有的 [Issues](https://github.com/FufuLauncher/FufuLauncher/issues) 以确认该建议是否已被提出

  - type: checkboxes
    id: pre_checks
    attributes:
      label: 前置确认 (Prerequisites)
      description: 提交前请确认以下各项均已满足
      options:
        - label: 已检索现有 Issues，确认此建议未被提及
          required: true
        - label: 该建议符合项目的发展方向
          required: true

  - type: textarea
    id: problem_statement
    attributes:
      label: 问题背景 (Background / Problem)
      description: 请描述当前软件的局限性，或者该建议旨在解决的具体问题。
      placeholder: 例如：当前启动器在处理大量游戏实例时，缺乏有效的分类筛选功能，导致用户查找效率低下
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: 方案详述 (Proposed Solution)
      description: 请详细描述您希望新增的功能或改进的具体逻辑。
      placeholder: 例如：建议在主界面增加一个标签系统，允许用户为不同实例打标签，并提供基于标签的过滤搜索栏
    validations:
      required: true

  - type: textarea
    id: expected_benefit
    attributes:
      label: 预期效果 (Expected Benefit)
      description: 请阐述该功能实现后能为用户或开发者带来的核心价值。
      placeholder: 例如：将显著提升重度用户在多实例环境下的操作体验，降低寻找特定版本的时间成本
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 (Alternatives Considered)
      description: 您是否考虑过其他不修改软件代码的替代方案？或当前您是如何规避此问题的？
      placeholder: 例如：目前只能通过手动修改文件夹名称来实现排序，但操作繁琐且不直观
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: 可选补充信息 (Additional Context)
      description: 提供任何有助于开发者理解该建议的额外信息（如：流程图、参考其他软件的设计、草图等）
    validations:
      required: false
